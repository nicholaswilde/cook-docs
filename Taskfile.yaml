---
version: '3'

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel
  PORT: 8000

tasks:
  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean
      - rm -rf dist cook-docs
  coverage:
    desc: Run tests
    cmds:
      - cargo test
  dist:
    desc: Create production release
    cmds:
      - cargo build --release
  build-all:
    desc: Build for all architectures
    cmds:
      - task: build-linux
      - task: build-macos
      - task: build-windows
  build-linux:
    desc: Build for Linux architectures using cross
    cmds:
      - cross build --release --target x86_64-unknown-linux-musl
      - cross build --release --target aarch64-unknown-linux-musl
      - cross build --release --target armv7-unknown-linux-musleabihf
      - cross build --release --target arm-unknown-linux-gnueabihf
  build-macos:
    desc: Build for macOS architectures (requires macOS host)
    cmds:
      - cargo build --release --target x86_64-apple-darwin
      - cargo build --release --target aarch64-apple-darwin
  build-windows:
    desc: Build for Windows architectures using cross/cargo
    cmds:
      - cross build --release --target x86_64-pc-windows-msvc
      - cross build --release --target aarch64-pc-windows-msvc
  deps:
    desc: Download dependencies
    cmds:
      - cargo fetch
  dry-run:
    desc: Perform a dry run
    cmds:
      - cargo run -- --recipe-search-root testdata --dry-run
  debug:
    desc: Run program with debug logs
    cmds:
      - >
        cargo run -- --recipe-search-root testdata \
        --template-files testdata/recipe.md.gotmpl \
        --log-level debug --dry-run
  fmt:
    desc: Format Rust code
    cmds:
      - cargo fmt --all
  help:
    desc: Show app help
    cmds:
      - cargo run -- --help
  jsonify:
    desc: Jsonify the recipe
    cmds:
      - cargo run -- --jsonify
  lint:
    desc: Lint the project
    cmds:
      - yamllint-rs .
      - cargo clippy -- -D warnings
  run:
    desc: Run program
    cmds:
      - cargo run -- --recipe-search-root testdata
  serve:
    desc: Serve a zensical server
    cmds:
      - uv run zensical serve -a 0.0.0.0:{{ .PORT }}
  spellcheck:
    desc: Run typos spellcheck
    cmds:
      - typos
  test:
    desc: Run Rust tests
    cmds:
      - cargo test
  default:
    desc: Lists tasks with or without a description
    cmds:
      - task -a
    silent: true
